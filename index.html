<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplikasi Ujian Online Perangkat Desa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Afacad+Flux:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        :root {
            --dark-blue: #2c3b4e;
            --primary-blue: #3c8dbc;
            --text-dark: #333333;
            --border-color: #d2d6de;
            --red-accent: #dd4b39;
        }
        body { font-family: 'Afacad Flux', sans-serif; background: #f4f6f9; }
        .login-container { max-width: 450px; margin: 100px auto; padding: 2rem; background: white; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="login-page" class="login-container">
        <h2 class="text-2xl font-bold mb-6 text-center">Login Ujian</h2>
        <form id="login-form">
            <input type="text" id="nama" placeholder="Masukkan Nama Lengkap" class="w-full p-2 border mb-3 rounded" required>
            <input type="text" id="nik" placeholder="Masukkan NIK atau ID" class="w-full p-2 border mb-3 rounded" required>
            <input type="text" id="token-input" placeholder="Masukkan Kode Token" class="w-full p-2 border mb-6 rounded" required>
            <button id="btn-submit-login" class="w-full bg-blue-600 text-white p-2 rounded hover:bg-blue-700">Masuk</button>
        </form>
    </div>

    <script>
        // --- KONFIGURASI ---
        const API_URL = "https://script.google.com/macros/s/AKfycbx3pWfwOKCoSX4460qy4Q5voozYXTiboM44LmkI_efdO-c2HjnTMAtmPjeAngwceyiokg/exec"; 
        
        console.log("Aplikasi dimuat. Silakan sambungkan API_URL Anda.");

        document.getElementById('login-form').addEventListener('submit', (e) => {
            e.preventDefault();
            alert("Sistem berhasil dimuat. Pastikan URL API sudah terkonfigurasi di dalam file.");
        });
    </script>
</body>
</html>
